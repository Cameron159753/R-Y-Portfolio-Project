<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://fonts.googleapis.com/css?family=Lato' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>
    <title>Portfolio Project</title>
</head>
<body>
    <div id="app">
        <!-- navigation menu with Vue Router -->
        <nav id="navbar">
            <router-link to="/" class="nav-link" custom v-slot="{ navigate, isActive }">
                <button @click="navigate" :class="['nav-link', { 'router-link-active': isActive }]">Home</button>
            </router-link>
            <router-link to="/about" class="nav-link" custom v-slot="{ navigate, isActive }">
                <button @click="navigate" :class="['nav-link', { 'router-link-active': isActive }]">About</button>
            </router-link>
            <router-link to="/contact" class="nav-link" custom v-slot="{ navigate, isActive }">
                <button @click="navigate" :class="['nav-link', { 'router-link-active': isActive }]">Contact</button>
            </router-link>
        </nav>

        <!-- Router View with transition -->
        <router-view v-slot="{ Component }">
            <transition name="fade" mode="out-in">
                <component :is="Component" />
            </transition>
        </router-view>

        <!-- footer -->
        <footer class="footer">
            <div class="footer-container">
                <p class="footer-name">© 2026 Cameron Bowers</p>
                <ul class="footer-links">
                    <li><router-link to="/" class="nav-link">Home</router-link></li>
                    <li><router-link to="/about" class="nav-link">About</router-link></li>
                    <li><router-link to="/contact" class="nav-link">Contact</router-link></li>
                </ul>
                <div class="footer-socials">
                    <a href="#">LinkedIn</a>
                    <a href="#">GitHub</a>
                    <a href="#">Email</a>
                </div>
            </div>
        </footer>
    </div>


</body>
<script src="/app.js"></script>
</html>
